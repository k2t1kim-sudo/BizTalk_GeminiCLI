<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 말투 변환기</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>업무 말투 변환기 💼</h1>
        <p class="subtitle">일상적인 메시지를 상황에 맞는 업무용 언어로 변환해 드립니다.</p>

        <div class="input-group">
            <label for="inputText">원문 입력</label>
            <textarea id="inputText" placeholder="변환할 메시지를 입력하세요... (예: 내일까지 보고서 제출 어려울 것 같음)"></textarea>
        </div>

        <div class="target-group">
            <label>수신 대상 선택</label>
            <div class="button-group">
                <button class="target-btn" data-target="boss">상사 / 임원</button>
                <button class="target-btn" data-target="colleague">타팀 동료</button>
                <button class="target-btn" data-target="team">팀 내 동료</button>
                <button class="target-btn" data-target="client">고객 / 외부</button>
            </div>
        </div>

        <button id="convertBtn" onclick="convertTone()">변환하기</button>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>적절한 말투로 변환 중입니다...</p>
        </div>

        <div class="output-group">
            <div class="output-header">
                <label for="outputText">변환 결과</label>
                <button id="copyBtn" onclick="copyResult()" disabled>복사하기</button>
            </div>
            <textarea id="outputText" readonly placeholder="변환된 결과가 여기에 표시됩니다."></textarea>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
